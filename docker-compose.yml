services:
  postgres:
    image: postgres:16
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_password
      POSTGRES_DB: taskflow_db
    ports:
      - "5432:5432"
    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: taskflow-redis
    ports:
      - "6379:6379"

  seq:
    image: datalust/seq:latest
    container_name: taskflow-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"
    volumes:
      - taskflow_seq_data:/data

volumes:
  taskflow_postgres_data:
  taskflow_seq_data: